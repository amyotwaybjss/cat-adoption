<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <title>Adopt a Cat!</title>
  </head>
  <body>
    <table style="width:70%" align="center" border="1">
        <tr align="center">
            {% for cat in cats_list %}
                <td>
                    <b>{{ cat.Name }}</b><br><img src="{{ image_location }}{{ cat.Image }}" alt="{{ cat.Name }}" height="100">
                </td>
            {% endfor %}
        </tr>
    </table>
  </body>
</html>
